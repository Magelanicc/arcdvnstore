<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Berhasil - ARCDVN STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#0f172a] text-white flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-slate-800 border border-slate-700 rounded-[2.5rem] p-8 text-center shadow-2xl">
        
        <div id="payment-section">
            <h1 class="text-2xl font-black mb-2">SCAN UNTUK BAYAR</h1>
            <p class="text-gray-400 text-xs mb-6 uppercase tracking-widest">Invoice: {{ tx.invoice_id }}</p>
            
            <div class="bg-white p-4 rounded-3xl inline-block mb-6 shadow-lg shadow-blue-500/20">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://arcdvn.com/pay/{{ tx.invoice_id }}" 
                     class="w-48 h-48" alt="QRIS">
            </div>

            <div class="bg-slate-900/50 p-4 rounded-2xl mb-6 border border-slate-700/50">
                <p class="text-gray-400 text-xs font-bold uppercase mb-1">Total Pembayaran</p>
                <p class="text-2xl font-black text-blue-400">Rp {{ tx.total_price }}</p>
            </div>

            <div class="flex items-center justify-center space-x-3 text-sm text-gray-400 italic">
                <div class="w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p>Menunggu pembayaran discan...</p>
            </div>
        </div>

        <div id="success-section" class="hidden">
            <div class="bg-green-500/20 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-3xl font-black mb-2 text-green-400 tracking-tight">PEMBAYARAN BERHASIL!</h2>
            <p class="text-gray-400 mb-8 text-sm leading-relaxed">Top up {{ tx.game_name }} untuk ID {{ tx.player_id }} sukses dikirim.</p>
            <a href="/" class="block w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold transition-all">Selesai</a>
        </div>
    </div>

    <script>
        
        setTimeout(() => {
            fetch('/api/pay-check/{{ tx.invoice_id }}/')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'SUCCESS') {
                        document.getElementById('payment-section').classList.add('hidden');
                        document.getElementById('success-section').classList.remove('hidden');
                    }
                });
        }, 5000); 
    </script>
</body>
